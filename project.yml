# XcodeGen project spec for Bloom. Do not edit generated Bloom.xcodeproj.
name: Bloom
options:
  bundleIdPrefix: com.shaver
  deploymentTarget:
    iOS: "17.0"
packages:
  BloomCore:
    path: Packages/BloomCore
targets:
  Bloom:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: App
        excludes:
          - "Support/ExportOptions.plist"
          - "Resources/FoodArt/svg/**"
    dependencies:
      - package: BloomCore
        product: BloomCore
    settings:
      base:
        TARGETED_DEVICE_FAMILY: "1"
        GENERATE_INFOPLIST_FILE: true
        PRODUCT_BUNDLE_IDENTIFIER: com.shaver.bloomcalculator
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "$(BUILD_NUMBER:default=1)"
        DEVELOPMENT_TEAM: "$(APPLE_TEAM_ID)"
        CODE_SIGN_STYLE: Automatic
        SWIFT_VERSION: "5.10"
        IPHONEOS_DEPLOYMENT_TARGET: "17.0"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
      configs:
        Debug: {}
        Release: {}
    info:
      path: Generated-Info.plist
      properties:
        CFBundleDisplayName: Hannah's Calculator
        CFBundleIconName: AppIcon
        ITSAppUsesNonExemptEncryption: false
        UIAppFonts:
          - Quicksand.ttf
          - PlayfairDisplay.ttf
          - PlayfairDisplay-Italic.ttf
          - GreatVibes-Regular.ttf
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
        UILaunchScreen:
          UIColorName: LaunchBackground
schemes:
  Bloom:
    build:
      targets:
        Bloom: all
    run:
      config: Debug
    archive:
      config: Release
